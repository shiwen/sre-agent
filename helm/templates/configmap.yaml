apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "sre-agent.fullname" . }}-config
  labels:
    {{- include "sre-agent.labels" . | nindent 4 }}
data:
  K8S_NAMESPACE: "{{ .Release.Namespace }}"
  LOG_LEVEL: "{{ .Values.env.LOG_LEVEL | default "INFO" }}"
  ENV: "{{ .Values.env.ENV | default "production" }}"
  DEBUG: "{{ .Values.env.DEBUG | default "false" }}"
  {{- if .Values.patrol.enabled }}
  PATROL_INTERVAL_MINUTES: "{{ .Values.patrol.intervalMinutes }}"
  PATROL_NOTIFICATION_CHANNEL: "{{ .Values.patrol.notificationChannel }}"
  {{- end }}